<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0, maximum-scale=1.0, user-scalable=no">
    <title>Baby Shape Matcher</title>
    <meta name="description" content="A fun sensory learning app where babies match colorful shapes to their outlines. Drag and drop shapes, hear sounds, and watch fireworks!">
    <meta name="theme-color" content="#ff4081">

    <!-- PWA Manifest -->
    <link rel="manifest" href="/manifest.json">

    <!-- Icons -->
    <link rel="icon" type="image/png" sizes="192x192" href="/icons/icon-192.png">
    <link rel="icon" type="image/png" sizes="512x512" href="/icons/icon-512.png">
    <link rel="apple-touch-icon" href="/icons/icon-192.png">

    <!-- iOS PWA Tags -->
    <meta name="apple-mobile-web-app-capable" content="yes">
    <meta name="apple-mobile-web-app-status-bar-style" content="black-translucent">
    <meta name="apple-mobile-web-app-title" content="Shape Match">

    <style>
        body, html {
            margin: 0; padding: 0;
            width: 100%; height: 100%;
            overflow: hidden;
            background-color: #0d1b2a;
            font-family: 'Segoe UI', Tahoma, Geneva, Verdana, sans-serif;
            touch-action: none;
            user-select: none;
            -webkit-user-select: none;
            -webkit-touch-callout: none;
        }
        canvas { display: block; width: 100%; height: 100%; }

        /* Start screen */
        #start-screen {
            position: absolute; top: 0; left: 0; right: 0; bottom: 0;
            background-color: rgba(255, 255, 255, 0.95);
            display: flex; flex-direction: column;
            justify-content: center; align-items: center;
            z-index: 10; cursor: pointer;
        }
        .pulse-button {
            background-color: #ff4081; color: white; border: none;
            padding: 20px 40px; font-size: 2rem; border-radius: 50px;
            font-weight: bold;
            box-shadow: 0 8px 15px rgba(255, 64, 129, 0.3);
            animation: pulse 1.5s infinite;
            pointer-events: none;
        }
        @keyframes pulse {
            0%   { transform: scale(1);   box-shadow: 0 8px 15px rgba(255,64,129,0.3); }
            50%  { transform: scale(1.1); box-shadow: 0 15px 25px rgba(255,64,129,0.5); }
            100% { transform: scale(1);   box-shadow: 0 8px 15px rgba(255,64,129,0.3); }
        }
        h1 { color: #00838f; text-align: center; margin-bottom: 40px; font-size: 3rem; }

        /* Fullscreen / lock button */
        #fullscreen-btn {
            position: absolute; top: 15px; right: 15px;
            background: rgba(255,255,255,0.2);
            border: 2px solid rgba(255,255,255,0.8);
            color: white; font-size: 28px;
            width: 50px; height: 50px; border-radius: 50%;
            cursor: pointer; z-index: 20;
            display: flex; justify-content: center; align-items: center;
            box-shadow: 0 4px 6px rgba(0,0,0,0.3);
            transition: background 0.3s;
        }
        #fullscreen-btn:active { background: rgba(255,255,255,0.5); }

        /* Parent gate modal */
        #parent-gate {
            display: none;
            position: fixed; top: 0; left: 0; right: 0; bottom: 0;
            background: rgba(0,0,0,0.85);
            z-index: 100;
            justify-content: center; align-items: center;
            flex-direction: column;
        }
        .gate-box {
            background: #1a2a3a; border-radius: 16px;
            padding: 30px 40px; text-align: center;
            box-shadow: 0 10px 40px rgba(0,0,0,0.5);
            max-width: 320px; width: 90%;
        }
        .gate-box h2 { color: #80cbc4; margin: 0 0 8px; font-size: 1.3rem; }
        .gate-box p { color: #b0bec5; margin: 0 0 20px; font-size: 0.9rem; }
        #gate-question {
            color: white; font-size: 1.8rem; font-weight: bold;
            margin-bottom: 16px; display: block;
        }
        #gate-answer {
            width: 80px; padding: 10px; font-size: 1.5rem;
            text-align: center; border-radius: 8px;
            border: 2px solid #80cbc4; background: #0d1b2a;
            color: white; outline: none;
        }
        #gate-answer:focus { border-color: #ff4081; }
        #gate-error { color: #ff5252; margin-top: 8px; min-height: 20px; font-size: 0.9rem; }
        .gate-buttons { margin-top: 16px; display: flex; gap: 10px; justify-content: center; }
        .gate-buttons button {
            padding: 10px 24px; border-radius: 8px; border: none;
            font-size: 1rem; font-weight: bold; cursor: pointer;
        }
        #gate-submit { background: #00bcd4; color: white; }
        #gate-cancel { background: #455a64; color: #cfd8dc; }
    </style>
</head>

<body>

    <button id="fullscreen-btn" aria-label="Toggle Fullscreen">⛶</button>

    <div id="start-screen">
        <h1>Baby Shape Matcher</h1>
        <button class="pulse-button">Tap to Play!</button>
    </div>

    <!-- Parent gate for child lock exit -->
    <div id="parent-gate">
        <div class="gate-box">
            <h2>🔒 Parent Check</h2>
            <p>Solve to exit fullscreen:</p>
            <span id="gate-question">What is 7 + 5?</span>
            <input type="number" id="gate-answer" inputmode="numeric" autocomplete="off">
            <div id="gate-error"></div>
            <div class="gate-buttons">
                <button id="gate-submit">Submit</button>
                <button id="gate-cancel">Cancel</button>
            </div>
        </div>
    </div>

    <canvas id="gameCanvas"></canvas>

    <!-- PWA Service Worker Registration -->
    <script>
        if ('serviceWorker' in navigator) {
            window.addEventListener('load', () => {
                navigator.serviceWorker.register('/sw.js')
                    .then(r => console.log('SW registered, scope:', r.scope))
                    .catch(e => console.warn('SW registration failed:', e));
            });
        }
    </script>

    <!-- Game Engine (loaded in order: engine → levels → main) -->
    <script src="/js/engine.js"></script>
    <script src="/js/levels.js"></script>
    <script src="/js/main.js"></script>

</body>
</html>
