# ============================================================================
# Netlify deployment configuration for Baby Shape Matcher PWA
# This is a static single-page site — no build step required.
# ============================================================================

[build]
  # Serve files directly from the repository root
  publish = "."

# ----------------------------------------------------------------------------
# Security and caching headers
# ----------------------------------------------------------------------------
[[headers]]
  for = "/*"
  [headers.values]
    X-Frame-Options = "DENY"
    X-Content-Type-Options = "nosniff"
    Referrer-Policy = "strict-origin-when-cross-origin"

# Service worker must NOT be cached by the browser, so updates take effect
[[headers]]
  for = "/sw.js"
  [headers.values]
    Cache-Control = "no-cache, no-store, must-revalidate"

# Manifest should also stay fresh
[[headers]]
  for = "/manifest.json"
  [headers.values]
    Cache-Control = "no-cache"

# Icons and other static assets can be cached aggressively
[[headers]]
  for = "/icons/*"
  [headers.values]
    Cache-Control = "public, max-age=31536000, immutable"
